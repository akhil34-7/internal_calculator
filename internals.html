<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVRJC Academic Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ea580c', // Orange-600
                        primaryHover: '#c2410c', // Orange-700
                        lightBg: '#fafafa',

            }

            from { opacity: 0; transform: translateY(10px); }

</head>
<body class="bg-gray-50 text-gray-800">

        </div>

        <!-- Mobile Menu -->

            <div class="space-y-1 pt-2 pb-3">

                <button onclick="switchTab('sgpa'); toggleMenu()" class="block w-full text-left pl-3 pr-4 py-2 border-l-4 border-transparent text-base font-medium text-gray-500 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-700">SGPA</button>

    <!-- JavaScript Logic -->
    <script>
        // --- Navigation Logic ---
        function switchTab(tabId) {
            // Hide all sections
            document.querySelectorAll('.app-section').forEach(section => {
                section.classList.add('hidden');
            });
            // Show selected section
            document.getElementById(tabId).classList.remove('hidden');

            // Update Nav Styling (Desktop)
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active-nav', 'text-gray-900');
                btn.classList.add('text-gray-500');
            });
            let activeBtn = document.getElementById('nav-' + tabId);
            if(activeBtn) {
                activeBtn.classList.add('active-nav', 'text-gray-900');
                activeBtn.classList.remove('text-gray-500');
            }
        }

        function toggleMenu() {
            const mobileMenu = document.getElementById("mobile-menu");
            mobileMenu.classList.toggle("hidden");
        }

        // --- INTERNAL MARKS LOGIC ---
        function calculateInternals(event) {
            event.preventDefault();

            let sm1 = parseFloat(document.getElementById("sm1").value) || 0;
            let sm2 = parseFloat(document.getElementById("sm2").value) || 0;
            let as1 = parseFloat(document.getElementById("as1").value) || 0;
            let as2 = parseFloat(document.getElementById("as2").value) || 0;
            let q1 = parseFloat(document.getElementById("q1").value) || 0;
            let q2 = parseFloat(document.getElementById("q2").value) || 0;
            let at = parseFloat(document.getElementById("at").value) || 0;

            let finalMarks = performInternalCalculation(sm1, sm2, as1, as2, q1, q2, at);

            const resultDiv = document.getElementById("internalResult");
            const resultVal = document.getElementById("internalValue");
            
            resultDiv.classList.remove("hidden");
            resultVal.textContent = finalMarks.toFixed(2);
        }

        function performInternalCalculation(sm1, sm2, as1, as2, q1, q2, at) {
            let atte = calculateAttendanceMarks(at);
            
            // Logic for Sessionals (80% of best, 20% of least)
            let finalSm1 = sm1, finalSm2 = sm2;
            if (sm1 >= sm2) {
                finalSm1 = sm1 * 0.8;
                finalSm2 = sm2 * 0.2;
            } else {
                finalSm1 = sm1 * 0.2;
                finalSm2 = sm2 * 0.8;
            }

            // Logic for Assignments (Similar weightage logic applied to base 12 marks conversion)
            // Original logic: (Mark/12)*2.8 for best, (Mark/12)*0.7 for least
            let finalAs1 = as1, finalAs2 = as2;
            if (as1 >= as2) {
                finalAs1 = (as1 / 12) * 2.8;
                finalAs2 = (as2 / 12) * 0.7;
            } else {
                finalAs1 = (as1 / 12) * 0.7;
                finalAs2 = (as2 / 12) * 2.8;
            }

            // Logic for Quizzes
            let finalQ1 = q1, finalQ2 = q2;
            if (q1 >= q2) {
                finalQ1 = (q1 / 12) * 2.8;
                finalQ2 = (q2 / 12) * 0.7;
            } else {
                finalQ1 = (q1 / 12) * 0.7;
                finalQ2 = (q2 / 12) * 2.8;
            }

            return finalSm1 + finalSm2 + finalAs1 + finalAs2 + finalQ1 + finalQ2 + atte;
        }

        function calculateAttendanceMarks(a) {
            if (a >= 90) return 5;
            if (a >= 80) return 4;
            if (a >= 70) return 3;
            if (a >= 60) return 2;
            if (a >= 50) return 1;
            return 0;
        }

        // --- SGPA LOGIC ---
        const credits = {

                "4.1": [[3, 3, 3, 3, 3, 3], [3, 2]]
            },
            chemical: {
                "1.1": [[3, 3, 3, 3], [1.5, 1.5, 1.5, 3]], "1.2": [[3, 3, 3, 3], [1.5, 1.5, 3, 1.5]],
                "2.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "2.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]],
                "3.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "3.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 2]],
                "4.1": [[3, 3, 3, 3, 3, 3], [3, 1.5, 2]]
            },
            cse: {

                "3.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "3.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]],
                "4.1": [[3, 3, 3, 3, 3, 3], [3, 2]]
            },

                "3.1": [[3, 3, 3, 3, 3], [1.5, 2, 1.5, 2]], "3.2": [[2, 3, 3, 3, 3, 3], [1, 1, 2]],
                "4.1": [[2, 3, 3, 3, 3, 3], [1, 3, 2]]
            },
            ece: {
                "1.1": [[3, 3, 3, 3], [1.5, 1, 3, 2]], "1.2": [[3, 3, 3, 3], [1.5, 2, 3, 1]],
                "2.1": [[3, 4, 3, 3, 3], [1, 1.5, 1, 2]], "2.2": [[3, 3, 4, 3, 3], [1.5, 1, 1, 2]],
                "3.1": [[3, 3, 3, 3, 3], [1.5, 2, 1.5, 2]], "3.2": [[3, 3, 3, 3, 3], [2, 1.5, 1.5, 2]],
                "4.1": [[3, 3, 3, 3, 2, 1.5],[ 3, 2]]

                "2.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "2.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]],
                "3.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "3.2": [[2, 3, 3, 3, 3], [3, 1.5, 1, 2]],
                "4.1": [[3, 3, 3, 3, 3, 3],[ 3, 2]]
            },
            csd: {
                "1.1": [[3, 3, 3, 3], [1.5, 1.5, 3, 1.5]], "1.2": [[3, 3, 3, 3, 2], [1.5, 1, 1.5, 1.5]],
                "2.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "2.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]],
                "3.1": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]], "3.2": [[3, 3, 3, 3, 3], [1.5, 1.5, 1.5, 2]],

        };

        const gradeValues = { "A+": 10, "A": 9, "B": 8, "C": 7, "D": 6, "E": 5, "F": 0 };

        function getSemesterCredits(branch, sem) {
            return credits[branch] && credits[branch][sem] ? credits[branch][sem] : [[], []];
        }

        function generateSubjectInputs() {
            const branch = document.getElementById("branch").value;
            const sem = `${document.getElementById("year").value}.${document.getElementById("sem").value}`;
            const container = document.getElementById("subjectInputs");
            container.innerHTML = "";

            const semesterCredits = getSemesterCredits(branch, sem);
            const subjects = semesterCredits[0] || [];
            const labs = semesterCredits[1] || [];

            if(subjects.length === 0 && labs.length === 0) {
                container.innerHTML = `<p class="text-red-500 col-span-2 text-center">No data available for this selection.</p>`;
                return;
            }

            // Helper to create Select box
            const createSelect = (id, labelText, type) => {
                const wrapper = document.createElement("div");
                wrapper.className = type === 'lab' ? "lab-input" : "subject-input";
                
                const label = document.createElement("label");
                label.className = "block text-sm font-medium text-gray-700 mb-1";
                label.textContent = labelText;
                
                const select = document.createElement("select");
                select.id = id;
                select.className = "block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring-primary sm:text-sm p-2 border bg-white";
                
                Object.keys(gradeValues).forEach(grade => {
                    const opt = document.createElement("option");
                    opt.value = grade;
                    opt.textContent = grade;
                    select.appendChild(opt);
                });

                wrapper.appendChild(label);
                wrapper.appendChild(select);
                return wrapper;
            };

            subjects.forEach((_, i) => container.appendChild(createSelect(`subject${i+1}`, `Subject ${i+1}`, 'sub')));
            labs.forEach((_, i) => container.appendChild(createSelect(`lab${i+1}`, `Lab ${i+1}`, 'lab')));

            // Add Calculate Button
            const btnDiv = document.createElement("div");
            btnDiv.className = "col-span-1 md:col-span-2 mt-4";
            btnDiv.innerHTML = `<button type="button" onclick="calculateSGPA()" class="w-full bg-primary text-white py-3 rounded-lg hover:bg-primaryHover transition font-bold shadow-md">Calculate SGPA</button>`;
            container.appendChild(btnDiv);
        }

        function calculateSGPA() {
            const branch = document.getElementById("branch").value;
            const sem = `${document.getElementById("year").value}.${document.getElementById("sem").value}`;
            const semesterCredits = getSemesterCredits(branch, sem);
            const subjects = document.querySelectorAll(".subject-input select");
            const labs = document.querySelectorAll(".lab-input select");

            let totalCredits = 0;
            let totalGradePoints = 0;

            subjects.forEach((select, i) => {
                const pts = gradeValues[select.value];
                const cr = semesterCredits[0][i];
                if (pts !== undefined && cr !== undefined) {
                    totalCredits += cr;
                    totalGradePoints += pts * cr;
                }
            });

            labs.forEach((select, i) => {
                const pts = gradeValues[select.value];
                const cr = semesterCredits[1][i];
                if (pts !== undefined && cr !== undefined) {
                    totalCredits += cr;
                    totalGradePoints += pts * cr;
                }
            });

            const sgpa = totalCredits > 0 ? (totalGradePoints / totalCredits) : 0;
            const display = document.getElementById("sgpaDisplayContainer");
            display.classList.remove("hidden");
            document.getElementById("sgpaDisplay").textContent = `SGPA: ${sgpa.toFixed(2)}`;
        }

        // --- CGPA LOGIC ---
        function generateInputFields() {
            const container = document.getElementById('inputFieldsContainer');
            const num = parseInt(document.getElementById('numSelect').value);
            container.innerHTML = '';

            for (let i = 1; i <= num; i++) {
                const div = document.createElement('div');
                div.innerHTML = `
                    <label class="block text-sm font-medium text-gray-700">SGPA of Semester ${i}</label>
                    <input type="number" id="marks${i}" step="0.01" class="block w-full p-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm" placeholder="0 - 10" oninput="validateInput(this)" required>
                `;
                container.appendChild(div);
            }
        }

        function validateInput(input) {
            const val = parseFloat(input.value);
            if (isNaN(val) || val < 0 || val > 10) {
                input.classList.add('border-red-500', 'ring-red-500', 'ring-1');
                input.classList.remove('border-gray-300');
            } else {
                input.classList.remove('border-red-500', 'ring-red-500', 'ring-1');
                input.classList.add('border-gray-300');
            }
        }

        function calculateCGPA() {
            const num = parseInt(document.getElementById('numSelect').value);
            let total = 0;
            let count = 0;
            let valid = true;

            // Check if inputs exist
            if(document.getElementById(`marks1`) === null) {
                alert("Please click 'Go' to generate fields first.");
                return;
            }

            for (let i = 1; i <= num; i++) {
                const input = document.getElementById(`marks${i}`);
                const val = parseFloat(input.value);

                if (isNaN(val) || val < 0 || val > 10) {
                    input.classList.add('border-red-500');
                    valid = false;
                } else {
                    total += val;
                    count++;
                }
            }

            const resDiv = document.getElementById('cgpaResult');
            if (valid && count > 0) {
                const cgpa = (total / count).toFixed(2);
                resDiv.innerHTML = `<span class="text-primary text-4xl">CGPA: ${cgpa}</span>`;
            } else {
                resDiv.innerHTML = `<span class="text-red-500">Please enter valid SGPA values (0-10).</span>`;
            }
        }

        // Initialize default inputs
        generateInputFields();
    </script>
</body>
</html>
